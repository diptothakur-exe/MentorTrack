<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>MentorTrack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Mono:wght@400;500&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── OVERLAY ───────────────────────────────────── -->
  <div class="overlay" id="overlay"></div>

  <!-- ── SIDEBAR ───────────────────────────────────── -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Sidebar">
    <div class="sidebar-top">
      <span class="sidebar-brand">MentorTrack</span>
      <button class="icon-btn" id="closeSidebar" aria-label="Close sidebar">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="sidebar-inner">
      <p class="sidebar-section-label">Sections</p>
      <ul class="tag-list" id="tagList" role="list"></ul>
    </div>

    <div class="sidebar-stats" id="sidebarStats">
      <div class="stat-row">
        <span class="stat-label">Total Sessions</span>
        <span class="stat-val" id="statTotal">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Completed</span>
        <span class="stat-val green" id="statCompleted">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Missed</span>
        <span class="stat-val red" id="statMissed">0</span>
      </div>
    </div>
  </aside>

  <!-- ── TOP BAR ────────────────────────────────────── -->
  <header class="topbar" role="banner">
    <button class="icon-btn" id="menuBtn" aria-label="Open menu">
      <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
        <rect width="18" height="2" rx="1" fill="currentColor"/>
        <rect y="5.5" width="12" height="2" rx="1" fill="currentColor"/>
        <rect y="11" width="15" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <h1 class="app-title">MentorTrack</h1>

    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
      <svg id="themeIconSun" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2"/>
        <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg id="themeIconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" style="display:none">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <!-- ── SEARCH BAR ─────────────────────────────────── -->
  <div class="search-wrap" role="search">
    <div class="search-box">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="search" id="searchInput" class="search-input"
        placeholder="Search student or section…" autocomplete="off" aria-label="Search" />
      <button class="search-clear" id="searchClear" style="display:none" aria-label="Clear search">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ── MAIN ───────────────────────────────────────── -->
  <main class="main" role="main">

    <!-- Calendar -->
    <section class="calendar-card" aria-label="Calendar">
      <div class="cal-nav-row">
        <button class="cal-nav-btn" id="prevMonth" aria-label="Previous month">‹</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button class="cal-nav-btn" id="nextMonth" aria-label="Next month">›</button>
      </div>
      <div class="cal-weekdays" aria-hidden="true">
        <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
      </div>
      <div class="cal-grid" id="calGrid" role="grid" aria-label="Calendar days"></div>
    </section>

    <!-- Income Bar -->
    <div class="income-bar" id="incomeBar" role="region" aria-label="Income summary">
      <div class="income-amounts" id="incomeAmounts">
        <div class="income-item">
          <span class="income-label">Today</span>
          <span class="income-value" id="incomeToday">₹0</span>
        </div>
        <div class="income-sep"></div>
        <div class="income-item">
          <span class="income-label">Month</span>
          <span class="income-value" id="incomeMonth">₹0</span>
        </div>
        <div class="income-sep"></div>
        <div class="income-item">
          <span class="income-label">All Time</span>
          <span class="income-value" id="incomeAll">₹0</span>
        </div>
      </div>
      <button class="income-toggle-btn" id="incomeToggle" aria-label="Toggle income visibility">Hide ₹</button>
    </div>

    <!-- Slot List -->
    <section class="slots-section" aria-label="Sessions">
      <div class="slots-header">
        <div class="slots-header-left">
          <span class="slots-date-label" id="slotsDateLabel">Today</span>
          <span class="slots-count" id="slotsCount"></span>
        </div>
        <button class="text-btn" id="clearDateFilter" style="display:none" aria-label="Go to today">Today →</button>
      </div>

      <div id="slotList" class="slot-list" role="list"></div>

      <div id="emptyState" class="empty-state" style="display:none" aria-live="polite">
        <div class="empty-ring">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
            <path d="M20 13v7M20 24v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">No sessions here</p>
        <span class="empty-sub">Tap <strong>+</strong> to add a session</span>
      </div>
    </section>

  </main>

  <!-- ── FAB ────────────────────────────────────────── -->
  <button class="fab" id="fabBtn" aria-label="Add new session">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- ── MODAL / BOTTOM SHEET ───────────────────────── -->
  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-label="Session form">
    <div class="modal-sheet" id="modalSheet">
      <div class="modal-drag-handle" aria-hidden="true"></div>

      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">New Session</h2>
        <button class="icon-btn" id="closeModal" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="slotDate">Date</label>
          <input type="text" id="slotDate" class="form-input" placeholder="Pick a date" readonly />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="slotStart">Start</label>
            <input type="time" id="slotStart" class="form-input" />
          </div>
          <div class="form-group">
            <label class="form-label" for="slotEnd">End</label>
            <input type="time" id="slotEnd" class="form-input" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="slotStudent">
            Student <span class="form-optional">optional · blank = free slot</span>
          </label>
          <input type="text" id="slotStudent" class="form-input" placeholder="Student name" autocomplete="off" />
        </div>

        <div class="form-group">
          <label class="form-label" for="slotTag">Section / Tag</label>
          <input type="text" id="slotTag" class="form-input" placeholder="e.g. Class 9, Physics" list="tagSuggestions" autocomplete="off" />
          <datalist id="tagSuggestions"></datalist>
        </div>

        <div class="form-group">
          <label class="form-label" for="slotIncome">
            Income <span class="form-optional">optional</span>
          </label>
          <div class="income-field">
            <span class="currency-symbol" aria-hidden="true">₹</span>
            <input type="number" id="slotIncome" class="form-input income-input"
              placeholder="0" min="0" step="any" />
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-danger" id="deleteBtn" style="display:none">Delete</button>
        <button class="btn btn-primary" id="saveBtn">Save Session</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="script.js"></script>
</body>
</html>
